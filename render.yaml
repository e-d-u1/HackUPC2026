services:
  - type: web
    name: hackupc-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # la introduces manualmente en el dashboard de Render
      - key: ELEVENLABS_API_KEY
        sync: false